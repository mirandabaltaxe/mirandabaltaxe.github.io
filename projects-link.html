<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Miranda Baltaxe — Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      background: #F5F0E8;
      color: #1C1C1A;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 300;
      width: 210mm;
      height: 297mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2rem;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2E6E69;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 3.2rem;
      color: #1A4A47;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .name em {
      color: #C9973A;
      font-style: normal;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #A8C5C2;
    }

    .message {
      font-size: 1.05rem;
      color: #1C1C1A;
      line-height: 1.7;
      max-width: 380px;
      font-weight: 300;
    }

    .url-wrap {
      background: #1A4A47;
      padding: 1rem 2.5rem;
      border-radius: 4px;
    }

    .url {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: #F5F0E8;
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .footer {
      position: absolute;
      bottom: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #A8C5C2;
    }
  </style>
</head>
<body>
  <p class="eyebrow">// portfolio</p>
  <h1 class="name">Miranda <em>Baltaxe</em></h1>
  <div class="divider"></div>
  <p class="message">
    My projects are best experienced live:<br>
    hardware builds, past projects, and embedded work at the link below.
  </p>
  <div class="url-wrap">
    <a class="url" href="https://mirandabaltaxe.github.io/#projects">
      mirandabaltaxe.github.io/#projects
    </a>
  </div>
  <p class="footer">embedded &amp; hardware engineer &nbsp;·&nbsp; London, UK</p>
</body>
</html>
